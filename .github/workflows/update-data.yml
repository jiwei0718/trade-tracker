name: update-data

on:
  schedule:
    # Daily at 06:00 UTC = 14:00 Taipei time
    - cron: "0 6 * * *"
  workflow_dispatch:  # also allow manual trigger from Actions tab
    inputs:
      reason:
        description: "Reason for manual run"
        default: "manual refresh"

permissions:
  contents: write  # needed to commit data/*.json back

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python backend/run.py

      - name: Commit updated data
        run: |
          git config user.name "trade-tracker-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/agreements.json data/events.json data/meta.json
          if git diff --staged --quiet; then
            echo "No data changes; skipping commit"
          else
            COUNT=$(python -c "import json;d=json.load(open('data/meta.json'));print(d.get('event_count_this_run', 0))")
            git commit -m "data: scheduled refresh ($COUNT events)"
            git push
          fi

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-log-${{ github.run_id }}
          path: |
            data/meta.json
            data/events.json
          retention-days: 30
